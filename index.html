  <!-- Floating Audit Button + Modal -->
  <button id="auditFloatingBtn" style="position:fixed;bottom:24px;right:24px;z-index:9999;background:linear-gradient(135deg,#a387c1,#7b5ea7);color:#fff;border:none;padding:14px 22px;border-radius:50px;font-family:'Jost',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;box-shadow:0 4px 24px rgba(163,135,193,0.4);display:flex;align-items:center;gap:8px;transition:transform .2s,box-shadow .2s" onmouseover="this.style.transform='scale(1.05)';this.style.boxShadow='0 6px 32px rgba(163,135,193,0.5)'" onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 4px 24px rgba(163,135,193,0.4)'">

    <div style="background:#1a1a2e;border:1px solid rgba(163,135,193,0.2);border-radius:20px;padding:36px;max-width:440px;width:90%;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
      <button onclick="document.getElementById('audit-overlay').style.display='none'" style="position:absolute;top:14px;right:18px;background:none;border:none;color:#9ca3af;font-size:1.3rem;cursor:pointer">&times;</button>
      <div style="margin-bottom:20px">
        <span style="background:rgba(163,135,193,0.15);color:#a387c1;font-size:0.75rem;padding:4px 12px;border-radius:20px;font-weight:600">✦ Kostenlos &amp; unverbindlich</span>
        <h2 style="color:#fff;font-family:'Jost',sans-serif;font-size:1.35rem;font-weight:700;margin:12px 0 6px">Gratis AI Visibility Audit</h2>
        <p style="color:#9ca3af;font-size:0.85rem;line-height:1.5;margin:0">Marke eingeben, Ergebnis per Mail. Kein Abo, kein Vertrag. Inkl. AI-Readiness Score und Quick Wins.</p>
      </div>
      <form id="auditForm" style="display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;flex-direction:column;gap:4px"><label style="color:#cbd5e1;font-size:0.75rem;font-weight:600">Brand / Firmenname *</label><input name="brand" required placeholder="z.B. ACME GmbH" style="background:#0f0f23;border:1px solid #2d2d50;border-radius:10px;padding:10px 14px;color:#e2e8f0;font-size:0.875rem;outline:none"></div>
        <div style="display:flex;flex-direction:column;gap:4px"><label style="color:#cbd5e1;font-size:0.75rem;font-weight:600">Domain</label><input name="domain" placeholder="z.B. acme.de" style="background:#0f0f23;border:1px solid #2d2d50;border-radius:10px;padding:10px 14px;color:#e2e8f0;font-size:0.875rem;outline:none"></div>
        <div style="display:flex;flex-direction:column;gap:4px"><label style="color:#cbd5e1;font-size:0.75rem;font-weight:600">Branche</label><input name="branche" placeholder="z.B. SaaS, E-Commerce" style="background:#0f0f23;border:1px solid #2d2d50;border-radius:10px;padding:10px 14px;color:#e2e8f0;font-size:0.875rem;outline:none"></div>
        <div style="display:flex;flex-direction:column;gap:4px"><label style="color:#cbd5e1;font-size:0.75rem;font-weight:600">E-Mail *</label><input name="email" type="email" required placeholder="name@firma.de" style="background:#0f0f23;border:1px solid #2d2d50;border-radius:10px;padding:10px 14px;color:#e2e8f0;font-size:0.875rem;outline:none"></div>

        <button type="submit" id="auditSubmitBtn" style="background:linear-gradient(135deg,#a387c1,#7b5ea7);color:#fff;border:none;padding:12px;border-radius:10px;font-family:'Jost',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity .2s">Sichtbarkeit checken →</button>

  <script>
  (function(){
    var overlay=document.getElementById('audit-overlay');
    var btn=document.getElementById('auditFloatingBtn');
    var form=document.getElementById('auditForm');
    var msg=document.getElementById('auditMsg');
    btn.addEventListener('click',function(){overlay.style.display='flex'});
    overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.style.display='none'});
    document.addEventListener('keydown',function(e){if(e.key==='Escape')overlay.style.display='none'});
    // Also open from any [data-open-audit] element
    document.addEventListener('click',function(e){if(e.target.closest('[data-open-audit]'))overlay.style.display='flex'});
    form.addEventListener('submit',function(e){
      e.preventDefault();
      if(!document.getElementById('auditGdpr').checked){msg.style.display='block';msg.style.background='#7f1d1d33';msg.style.color='#fca5a5';msg.textContent='Bitte Datenschutz akzeptieren.';return}
      var sub=document.getElementById('auditSubmitBtn');sub.disabled=true;sub.textContent='Wird gesendet…';
      var fd=new FormData(form);
      fetch('/api/audit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({brand:fd.get('brand'),domain:fd.get('domain'),branche:fd.get('branche'),email:fd.get('email')})})
      .then(function(r){return r.json()})
      .then(function(d){
        msg.style.display='block';
        if(d.success){msg.style.background='#05281e';msg.style.color='#bbd8a7';msg.textContent=d.message;form.reset();if(window.plausible)plausible('Audit CTA Submitted',{props:{brand:fd.get('brand')}})}
        else{msg.style.background='#7f1d1d33';msg.style.color='#fca5a5';msg.textContent=d.error||'Fehler aufgetreten.'}
        sub.disabled=false;sub.textContent='Sichtbarkeit checken →';
      }).catch(function(){msg.style.display='block';msg.style.background='#7f1d1d33';msg.style.color='#fca5a5';msg.textContent='Verbindungsfehler.';sub.disabled=false;sub.textContent='Sichtbarkeit checken →'});
    });
  })();
  </script>
